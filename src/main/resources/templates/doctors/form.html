<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="${doctorId != null} ? 'Редактирай лекар — МедДосие' : 'Нов лекар — МедДосие'">Лекар</title>
</head>
<body>
<section>
    <!-- Header -->
    <div class="flex items-center gap-3 mb-8">
        <a th:href="@{/doctors}" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-slate-200 hover:bg-slate-50 transition-colors">
            <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <div>
            <h1 style="font-family:'DM Serif Display',serif" class="text-3xl text-slate-800"
                th:text="${doctorId != null} ? 'Редактирай лекар' : 'Нов лекар'">Лекар</h1>
            <p class="text-slate-500 text-sm mt-1">Попълнете данните за лекаря</p>
        </div>
    </div>

    <!-- Form card -->
    <div class="max-w-2xl">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
            <form th:action="${doctorId != null} ? @{/doctors/{id}/edit(id=${doctorId})} : @{/doctors/new}"
                  th:object="${doctor}" method="post" class="space-y-6">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Name -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Пълно име</label>
                    <input type="text" th:field="*{name}"
                           class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all"
                           placeholder="Д-р Иван Иванов"/>
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="mt-1.5 text-xs text-red-500"></p>
                </div>

                <!-- User (create only) -->
                <div th:if="${doctorId == null}">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Потребителски акаунт</label>
                    <select th:field="*{userId}"
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all">
                        <option value="">— Избери потребител —</option>
                        <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.username}"></option>
                    </select>
                    <p th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}" class="mt-1.5 text-xs text-red-500"></p>
                </div>

                <!-- User (edit only - readonly) -->
                <div th:if="${doctorId != null}">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Потребителски акаунт</label>
                    <input type="text" th:value="${doctorUsername}" readonly
                           class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-500 text-sm bg-slate-100 cursor-not-allowed"/>
                </div>

                <!-- Speciality -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Специалност</label>
                    <select th:field="*{specialityId}"
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all">
                        <option value="">— Избери специалност —</option>
                        <option th:each="s : ${specialities}" th:value="${s.id}" th:text="${s.name}"></option>
                    </select>
                    <p th:if="${#fields.hasErrors('specialityId')}" th:errors="*{specialityId}" class="mt-1.5 text-xs text-red-500"></p>
                </div>

                <!-- Is GP -->
                <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-lg border border-slate-200">
                    <input type="checkbox" th:field="*{gp}" id="gpCheck"
                           class="w-4 h-4 rounded border-slate-300 text-teal-600 focus:ring-teal-500"/>
                    <div>
                        <label for="gpCheck" class="text-sm font-medium text-slate-700 cursor-pointer">Личен лекар</label>
                        <p class="text-xs text-slate-500">Отметнете ако лекарят може да бъде личен лекар на пациенти</p>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="flex items-center gap-3 pt-2">
                    <button type="submit"
                            class="bg-teal-700 hover:bg-teal-800 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors">
                        Запази
                    </button>
                    <a th:href="@{/doctors}"
                       class="px-6 py-2.5 rounded-lg text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">
                        Откажи
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
