<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Прегледи — МедДосие</title>
</head>
<body>
<section>
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 style="font-family:'DM Serif Display',serif" class="text-3xl text-slate-800">Прегледи</h1>
            <p class="text-slate-500 text-sm mt-1">История на медицинските прегледи</p>
        </div>
        <a th:href="@{/examinations/new}"
           sec:authorize="hasRole('DOCTOR')"
           class="flex items-center gap-2 bg-teal-700 hover:bg-teal-800 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Нов преглед
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden card">
        <table class="w-full text-sm">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-100">
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Дата</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Лекар</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Пациент</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Диагноза</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Цена</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Платено от</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Болничен</th>
                    <th class="px-6 py-4"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
                <tr th:each="e : ${examinations}" class="hover:bg-slate-50">
                    <td class="px-6 py-4 text-slate-600 text-xs whitespace-nowrap"
                        th:text="${#temporals.format(e.dateTime, 'dd.MM.yyyy HH:mm')}"></td>
                    <td class="px-6 py-4 font-medium text-slate-800" th:text="${e.doctorName}"></td>
                    <td class="px-6 py-4 text-slate-600" th:text="${e.patientName}"></td>
                    <td class="px-6 py-4">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800"
                              th:text="${e.diagnosisName}"></span>
                    </td>
                    <td class="px-6 py-4 font-medium text-slate-800" th:text="${e.price} + ' лв.'"></td>
                    <td class="px-6 py-4">
                        <span th:if="${e.paidByDisplay == 'НЗОК'}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-teal-100 text-teal-800">НЗОК</span>
                        <span th:unless="${e.paidByDisplay == 'НЗОК'}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">Пациент</span>
                    </td>
                    <td class="px-6 py-4">
                        <span th:if="${e.hasSickLeave}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">Да</span>
                        <span th:unless="${e.hasSickLeave}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-500">Не</span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center justify-end gap-2">
                            <a th:href="@{/examinations/{id}/edit(id=${e.id})}"
                               sec:authorize="hasAnyRole('DOCTOR','ADMIN')"
                               class="px-3 py-1.5 text-xs font-medium text-teal-700 bg-teal-50 hover:bg-teal-100 rounded-lg transition-colors">
                                Редактирай
                            </a>
                            <form th:action="@{/examinations/{id}/delete(id=${e.id})}" method="post"
                                  style="display:inline" sec:authorize="hasRole('ADMIN')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" onclick="return confirm('Сигурни ли сте?')"
                                        class="px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
                                    Изтрий
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(examinations)}">
                    <td colspan="8" class="px-6 py-12 text-center text-slate-400">Няма намерени прегледи</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
