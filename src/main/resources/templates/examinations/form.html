<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="${examinationId != null} ? 'Редактирай преглед — МедДосие' : 'Нов преглед — МедДосие'">Преглед</title>
</head>
<body>
<section>
    <div class="flex items-center gap-3 mb-8">
        <a th:href="@{/examinations}" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-slate-200 hover:bg-slate-50 transition-colors">
            <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <div>
            <h1 style="font-family:'DM Serif Display',serif" class="text-3xl text-slate-800"
                th:text="${examinationId != null} ? 'Редактирай преглед' : 'Нов преглед'">Преглед</h1>
            <p class="text-slate-500 text-sm mt-1">Попълнете данните за прегледа</p>
        </div>
    </div>

    <!-- Info bar for edit mode -->
    <div th:if="${examinationId != null}" class="max-w-2xl mb-6">
        <div class="bg-teal-50 border border-teal-200 rounded-xl p-4 flex items-center gap-4">
            <div class="flex-1">
                <p class="text-xs text-teal-600 font-medium uppercase tracking-wide mb-1">Лекар</p>
                <p class="text-sm font-medium text-teal-900" th:text="${examinationInfo.doctorName}"></p>
            </div>
            <div class="w-px h-8 bg-teal-200"></div>
            <div class="flex-1">
                <p class="text-xs text-teal-600 font-medium uppercase tracking-wide mb-1">Пациент</p>
                <p class="text-sm font-medium text-teal-900" th:text="${examinationInfo.patientName}"></p>
            </div>
        </div>
    </div>

    <div class="max-w-2xl">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
            <form th:action="${examinationId != null} ? @{/examinations/{id}/edit(id=${examinationId})} : @{/examinations/new}"
                  th:object="${examination}" method="post" class="space-y-6">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Patient (create only) -->
                <div th:if="${examinationId == null}">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Пациент</label>
                    <select th:field="*{patientId}"
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all">
                        <option value="">— Избери пациент —</option>
                        <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                    <p th:if="${#fields.hasErrors('patientId')}" th:errors="*{patientId}" class="mt-1.5 text-xs text-red-500"></p>
                </div>

                <!-- Diagnosis -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Диагноза</label>
                    <select th:field="*{diagnosisId}"
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all">
                        <option value="">— Избери диагноза —</option>
                        <option th:each="d : ${diagnoses}" th:value="${d.id}" th:text="${d.name}"></option>
                    </select>
                    <p th:if="${#fields.hasErrors('diagnosisId')}" th:errors="*{diagnosisId}" class="mt-1.5 text-xs text-red-500"></p>
                </div>

                <!-- Treatment -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Назначено лечение</label>
                    <textarea th:field="*{treatment}" rows="3"
                              class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all resize-none"
                              placeholder="Опишете назначеното лечение..."></textarea>
                </div>

                <!-- Price -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Цена (лв.)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm">лв.</span>
                        <input type="number" step="0.01" th:field="*{price}"
                               class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all"
                               placeholder="0.00"/>
                    </div>
                    <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="mt-1.5 text-xs text-red-500"></p>
                </div>

                <!-- Sick leave toggle -->
                <div class="border border-slate-200 rounded-xl overflow-hidden">
                    <div class="flex items-center gap-3 p-4 bg-slate-50">
                        <input type="checkbox" th:field="*{issueSickLeave}" id="issueSickLeave"
                               class="w-4 h-4 rounded border-slate-300 text-teal-600"/>
                        <div>
                            <label for="issueSickLeave" class="text-sm font-medium text-slate-700 cursor-pointer">Издай болничен лист</label>
                            <p class="text-xs text-slate-500">Отметнете за да издадете болничен към прегледа</p>
                        </div>
                    </div>
                    <div id="sickLeaveFields"
                         th:style="${examination.issueSickLeave} ? '' : 'display:none'"
                         class="p-4 space-y-4 border-t border-slate-200">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1.5">Начална дата</label>
                                <input type="date" th:field="*{sickLeaveStartDate}"
                                       class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-white transition-all"/>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1.5">Брой дни</label>
                                <input type="number" th:field="*{sickLeaveDays}" min="1"
                                       class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-white transition-all"
                                       placeholder="3"/>
                                <p th:if="${#fields.hasErrors('sickLeaveDays')}" th:errors="*{sickLeaveDays}" class="mt-1.5 text-xs text-red-500"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-3 pt-2">
                    <button type="submit"
                            class="bg-teal-700 hover:bg-teal-800 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors">
                        Запази
                    </button>
                    <a th:href="@{/examinations}"
                       class="px-6 py-2.5 rounded-lg text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">
                        Откажи
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('issueSickLeave').addEventListener('change', function() {
            document.getElementById('sickLeaveFields').style.display = this.checked ? 'block' : 'none';
        });
    </script>
</section>
</body>
</html>
