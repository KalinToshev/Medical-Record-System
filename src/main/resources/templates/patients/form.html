<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="${patientId != null} ? 'Редактирай пациент — МедДосие' : 'Нов пациент — МедДосие'">Пациент</title>
</head>
<body>
<section>
    <div class="flex items-center gap-3 mb-8">
        <a th:href="@{/patients}" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-slate-200 hover:bg-slate-50 transition-colors">
            <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <div>
            <h1 style="font-family:'DM Serif Display',serif" class="text-3xl text-slate-800"
                th:text="${patientId != null} ? 'Редактирай пациент' : 'Нов пациент'">Пациент</h1>
            <p class="text-slate-500 text-sm mt-1">Попълнете данните за пациента</p>
        </div>
    </div>

    <div class="max-w-2xl">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
            <form th:action="${patientId != null} ? @{/patients/{id}/edit(id=${patientId})} : @{/patients/new}"
                  th:object="${patient}" method="post" class="space-y-6">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Пълно име</label>
                    <input type="text" th:field="*{name}"
                           class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all"
                           placeholder="Иван Иванов"/>
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="mt-1.5 text-xs text-red-500"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">ЕГН</label>
                    <input type="text" th:field="*{egn}" maxlength="10"
                           class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 font-mono transition-all"
                           placeholder="0000000000"/>
                    <p th:if="${#fields.hasErrors('egn')}" th:errors="*{egn}" class="mt-1.5 text-xs text-red-500"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Личен лекар</label>
                    <select th:field="*{gpId}"
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all">
                        <option value="">— Избери личен лекар —</option>
                        <option th:each="gp : ${gps}" th:value="${gp.id}" th:text="${gp.name}"></option>
                    </select>
                    <p th:if="${#fields.hasErrors('gpId')}" th:errors="*{gpId}" class="mt-1.5 text-xs text-red-500"></p>
                </div>

                <div th:if="${patientId == null}">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Потребителски акаунт</label>
                    <select th:field="*{userId}"
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all">
                        <option value="">— Избери потребител —</option>
                        <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.username}"></option>
                    </select>
                    <p th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}" class="mt-1.5 text-xs text-red-500"></p>
                </div>

                <div th:if="${patientId != null}">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Потребителски акаунт</label>
                    <input type="text" th:value="${patientUsername}" readonly
                           class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-500 text-sm bg-slate-100 cursor-not-allowed"/>
                </div>

                <div class="flex items-center gap-3 pt-2">
                    <button type="submit"
                            class="bg-teal-700 hover:bg-teal-800 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors">
                        Запази
                    </button>
                    <a th:href="@{/patients}"
                       class="px-6 py-2.5 rounded-lg text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">
                        Откажи
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
