<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>История на пациент — МедДосие</title>
</head>
<body>
<section>
    <div class="flex items-center gap-3 mb-8">
        <a th:href="@{/examinations}" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-slate-200 hover:bg-slate-50 transition-colors">
            <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <div>
            <h1 style="font-family:'DM Serif Display',serif" class="text-3xl text-slate-800">История на пациент</h1>
            <p class="text-slate-500 text-sm mt-1">Назад към прегледите</p>
        </div>
    </div>

    <!-- Patient details card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6 card">
        <h2 class="text-base font-semibold text-slate-800 mb-4">Данни за пациента</h2>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 text-sm">
            <div>
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Име</p>
                <p class="text-slate-800 font-medium" th:text="${patient.name}"></p>
            </div>
            <div>
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">ЕГН</p>
                <p class="text-slate-800 font-medium" th:text="${patient.egn}"></p>
            </div>
            <div>
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Личен лекар</p>
                <p class="text-slate-800 font-medium" th:text="${patient.gpName}"></p>
            </div>
        </div>
    </div>

    <!-- Examination history -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden card mb-6">
        <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
            <h2 class="text-base font-semibold text-slate-800">История на прегледите</h2>
        </div>
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-slate-100">
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Дата</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Лекар</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Диагноза</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Лечение</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Цена</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Платено от</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Болничен</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
                <tr th:each="exam : ${examinations}" class="hover:bg-slate-50">
                    <td class="px-6 py-4 text-slate-600 text-xs whitespace-nowrap"
                        th:text="${#temporals.format(exam.dateTime, 'dd.MM.yyyy HH:mm')}"></td>
                    <td class="px-6 py-4 font-medium text-slate-800" th:text="${exam.doctorName}"></td>
                    <td class="px-6 py-4">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800"
                              th:text="${exam.diagnosisName}"></span>
                    </td>
                    <td class="px-6 py-4 text-slate-600" th:text="${exam.treatment}"></td>
                    <td class="px-6 py-4 font-medium text-slate-800" th:text="${#numbers.formatDecimal(exam.price, 1, 2)} + ' лв.'"></td>
                    <td class="px-6 py-4">
                        <span th:if="${exam.paidByDisplay == 'НЗОК'}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-teal-100 text-teal-800">НЗОК</span>
                        <span th:unless="${exam.paidByDisplay == 'НЗОК'}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">Пациент</span>
                    </td>
                    <td class="px-6 py-4">
                        <span th:if="${exam.hasSickLeave}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">Да</span>
                        <span th:unless="${exam.hasSickLeave}"
                              class="text-slate-400">—</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(examinations)}">
                    <td colspan="7" class="px-6 py-12 text-center text-slate-400">Няма прегледи</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Health insurance (last 6 months) -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden card">
        <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
            <h2 class="text-base font-semibold text-slate-800">Здравно осигуряване (последни 6 месеца)</h2>
        </div>
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-slate-100">
                    <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Месец/Година</th>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Статус</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
                <tr th:each="ins : ${insurances}" class="hover:bg-slate-50">
                    <td class="px-6 py-3.5 text-slate-800"
                        th:text="${ins.month} + '/' + ${ins.year}"></td>
                    <td class="px-6 py-3.5">
                        <span th:if="${ins.paid}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-teal-100 text-teal-800">Платено</span>
                        <span th:unless="${ins.paid}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">Неплатено</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(insurances)}">
                    <td colspan="2" class="px-6 py-10 text-center text-slate-400 text-sm">Няма данни</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
