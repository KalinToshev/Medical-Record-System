<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Пациенти — МедДосие</title>
</head>
<body>
<section>
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 style="font-family:'DM Serif Display',serif" class="text-3xl text-slate-800">Пациенти</h1>
            <p class="text-slate-500 text-sm mt-1">Регистрирани пациенти в системата</p>
        </div>
        <a th:href="@{/patients/new}"
           class="flex items-center gap-2 bg-teal-700 hover:bg-teal-800 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Нов пациент
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden card">
        <table class="w-full text-sm">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-100">
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Пациент</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">ЕГН</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Личен лекар</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Потребител</th>
                    <th class="px-6 py-4"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
                <tr th:each="patient : ${patients}" class="hover:bg-slate-50">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
                                <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                </svg>
                            </div>
                            <span class="font-medium text-slate-800" th:text="${patient.name}"></span>
                        </div>
                    </td>
                    <td class="px-6 py-4 font-mono text-slate-600 text-xs" th:text="${patient.egn}"></td>
                    <td class="px-6 py-4 text-slate-600" th:text="${patient.gpName}"></td>
                    <td class="px-6 py-4 text-slate-500 text-xs" th:text="${patient.username}"></td>
                    <td class="px-6 py-4">
                        <div class="flex items-center justify-end gap-2">
                            <a th:href="@{/patients/{id}/insurances(id=${patient.id})}"
                               class="px-3 py-1.5 text-xs font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors">
                                Осигуровки
                            </a>
                            <a th:href="@{/patients/{id}/edit(id=${patient.id})}"
                               class="px-3 py-1.5 text-xs font-medium text-teal-700 bg-teal-50 hover:bg-teal-100 rounded-lg transition-colors">
                                Редактирай
                            </a>
                            <form th:action="@{/patients/{id}/delete(id=${patient.id})}" method="post" style="display:inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" onclick="return confirm('Сигурни ли сте?')"
                                        class="px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
                                    Изтрий
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(patients)}">
                    <td colspan="5" class="px-6 py-12 text-center text-slate-400">Няма намерени пациенти</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
