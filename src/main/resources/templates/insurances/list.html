<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Здравни осигуровки — МедДосие</title></head>
<body>
<section>
    <div class="flex items-center gap-3 mb-8">
        <a th:href="@{/patients}" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-slate-200 hover:bg-slate-50 transition-colors">
            <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <div>
            <h1 style="font-family:'DM Serif Display',serif" class="text-3xl text-slate-800">Здравни осигуровки</h1>
            <p class="text-slate-500 text-sm mt-1">Пациент: <span class="font-medium text-slate-700" th:text="${patient.name}"></span></p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Add form -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                <h2 class="text-base font-semibold text-slate-800 mb-5">Добави запис</h2>

                <div th:if="${duplicateError}" class="mb-4 px-3 py-2.5 bg-red-50 border border-red-200 rounded-lg">
                    <p class="text-red-600 text-xs" th:text="${duplicateError}"></p>
                </div>

                <form th:action="@{/patients/{patientId}/insurances/new(patientId=${patient.id})}"
                      th:object="${insurance}" method="post" class="space-y-4">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1">Година</label>
                        <input type="number" th:field="*{year}"
                               class="w-full px-3 py-2 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all"
                               placeholder="2026"/>
                        <p th:if="${#fields.hasErrors('year')}" th:errors="*{year}" class="mt-1 text-xs text-red-500"></p>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1">Месец</label>
                        <select th:field="*{month}"
                                class="w-full px-3 py-2 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all">
                            <option value="">— Избери —</option>
                            <option th:each="m : ${#numbers.sequence(1, 12)}" th:value="${m}" th:text="${m}"></option>
                        </select>
                        <p th:if="${#fields.hasErrors('month')}" th:errors="*{month}" class="mt-1 text-xs text-red-500"></p>
                    </div>

                    <div class="flex items-center gap-2 p-3 bg-slate-50 rounded-lg border border-slate-200">
                        <input type="checkbox" th:field="*{paid}" id="paidCheck"
                               class="w-4 h-4 rounded border-slate-300 text-teal-600"/>
                        <label for="paidCheck" class="text-sm text-slate-700 cursor-pointer">Платена</label>
                    </div>

                    <button type="submit"
                            class="w-full bg-teal-700 hover:bg-teal-800 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">
                        Добави
                    </button>
                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="lg:col-span-2">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden card">
                <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
                    <h2 class="text-base font-semibold text-slate-800">История на осигуровките</h2>
                </div>
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-slate-100">
                            <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Година</th>
                            <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Месец</th>
                            <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Статус</th>
                            <th class="px-6 py-3"></th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <tr th:each="ins : ${insurances}" class="hover:bg-slate-50">
                            <td class="px-6 py-3.5 text-slate-800" th:text="${ins.year}"></td>
                            <td class="px-6 py-3.5 text-slate-600" th:text="${ins.month}"></td>
                            <td class="px-6 py-3.5">
                                <span th:if="${ins.paid}"
                                      class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-teal-100 text-teal-800">Платена</span>
                                <span th:unless="${ins.paid}"
                                      class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">Неплатена</span>
                            </td>
                            <td class="px-6 py-3.5 text-right">
                                <form th:action="@{/patients/{patientId}/insurances/{id}/delete(patientId=${patient.id}, id=${ins.id})}"
                                      method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            class="px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
                                        Изтрий
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(insurances)}">
                            <td colspan="4" class="px-6 py-10 text-center text-slate-400 text-sm">Няма добавени осигуровки</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
</body>
</html>
