<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Диагнози — МедДосие</title></head>
<body>
<section>
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 style="font-family:'DM Serif Display',serif" class="text-3xl text-slate-800">Диагнози</h1>
            <p class="text-slate-500 text-sm mt-1">Медицински диагнози в системата</p>
        </div>
        <a th:href="@{/diagnoses/new}"
           class="flex items-center gap-2 bg-teal-700 hover:bg-teal-800 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Нова диагноза
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden card max-w-2xl">
        <table class="w-full text-sm">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-100">
                    <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Диагноза</th>
                    <th class="px-6 py-4"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
                <tr th:each="diagnosis : ${diagnoses}" class="hover:bg-slate-50">
                    <td class="px-6 py-4">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800"
                              th:text="${diagnosis.name}"></span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center justify-end gap-2">
                            <a th:href="@{/diagnoses/{id}/edit(id=${diagnosis.id})}"
                               class="px-3 py-1.5 text-xs font-medium text-teal-700 bg-teal-50 hover:bg-teal-100 rounded-lg transition-colors">
                                Редактирай
                            </a>
                            <form th:action="@{/diagnoses/{id}/delete(id=${diagnosis.id})}" method="post" style="display:inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" onclick="return confirm('Сигурни ли сте?')"
                                        class="px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
                                    Изтрий
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(diagnoses)}">
                    <td colspan="2" class="px-6 py-12 text-center text-slate-400">Няма добавени диагнози</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
