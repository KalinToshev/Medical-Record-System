<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="${diagnosisId} ? 'Редактирай диагноза — МедДосие' : 'Нова диагноза — МедДосие'">Диагноза</title>
</head>
<body>
<section>
    <div class="flex items-center gap-3 mb-8">
        <a th:href="@{/diagnoses}" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-slate-200 hover:bg-slate-50 transition-colors">
            <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 style="font-family:'DM Serif Display',serif" class="text-3xl text-slate-800"
            th:text="${diagnosisId} ? 'Редактирай диагноза' : 'Нова диагноза'">Диагноза</h1>
    </div>
    <div class="max-w-lg">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
            <form th:action="${diagnosisId} ? @{/diagnoses/{id}/edit(id=${diagnosisId})} : @{/diagnoses/new}"
                  th:object="${diagnosis}" method="post" class="space-y-6">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Наименование</label>
                    <input type="text" th:field="*{name}"
                           class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all"
                           placeholder="Грип"/>
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="mt-1.5 text-xs text-red-500"></p>
                </div>
                <div class="flex items-center gap-3">
                    <button type="submit" class="bg-teal-700 hover:bg-teal-800 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors">Запази</button>
                    <a th:href="@{/diagnoses}" class="px-6 py-2.5 rounded-lg text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">Откажи</a>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
