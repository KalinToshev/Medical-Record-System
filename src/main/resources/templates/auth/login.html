<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Вход — МедДосие</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        input:focus { outline: none; border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13,148,136,0.15); }
        .bg-pattern {
            background-image: radial-gradient(circle at 20% 50%, rgba(15,76,92,0.08) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(13,148,136,0.06) 0%, transparent 50%);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 bg-pattern flex items-center justify-center p-4">

    <div class="w-full max-w-md fade-in">
        <!-- Logo -->
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-teal-700 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
            </div>
            <h1 style="font-family:'DM Serif Display',serif" class="text-3xl text-slate-800">МедДосие</h1>
            <p class="text-slate-500 text-sm mt-1 font-light">Медицинска информационна система</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
            <h2 class="text-xl font-semibold text-slate-800 mb-6">Добре дошли</h2>

            <!-- Error message -->
            <div th:if="${param.error}" class="mb-5 px-4 py-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
                <svg class="w-4 h-4 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <p class="text-red-600 text-sm">Грешно потребителско име или парола.</p>
            </div>

            <!-- Logout message -->
            <div th:if="${param.logout}" class="mb-5 px-4 py-3 bg-teal-50 border border-teal-200 rounded-lg flex items-center gap-2">
                <svg class="w-4 h-4 text-teal-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                <p class="text-teal-700 text-sm">Успешно излязохте от системата.</p>
            </div>

            <form th:action="@{/login}" method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Потребителско име</label>
                    <input type="text" name="username" autocomplete="username"
                           class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all"
                           placeholder="Въведете потребителско име"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Парола</label>
                    <input type="password" name="password" autocomplete="current-password"
                           class="w-full px-4 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm bg-slate-50 transition-all"
                           placeholder="••••••••"/>
                </div>
                <button type="submit"
                        class="w-full bg-teal-700 hover:bg-teal-800 text-white font-medium py-2.5 px-4 rounded-lg transition-colors duration-200 text-sm mt-2">
                    Влез в системата
                </button>
            </form>
        </div>

        <p class="text-center text-slate-400 text-xs mt-6">© 2026 МедДосие. Всички права запазени.</p>
    </div>

</body>
</html>
