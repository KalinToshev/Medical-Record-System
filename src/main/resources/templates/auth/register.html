<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Регистрация — МедДосие</title></head>
<body>
<section>
    <div class="max-w-md mx-auto mt-10">
        <h1 style="font-family:'DM Serif Display',serif"
            class="text-3xl text-slate-800 mb-6 text-center">Регистрация</h1>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
            <div th:if="${errorMessage}"
                 class="mb-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm"
                 th:text="${errorMessage}"></div>

            <form th:action="@{/register}" th:object="${registerForm}" method="post" class="space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Потребителско име</label>
                    <input type="text" th:field="*{username}"
                           class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"/>
                    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}"
                       class="text-red-500 text-xs mt-1"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Парола</label>
                    <input type="password" th:field="*{password}"
                           class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"/>
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                       class="text-red-500 text-xs mt-1"></p>
                </div>

                <button type="submit"
                        class="w-full bg-teal-700 hover:bg-teal-800 text-white py-2.5 rounded-lg text-sm font-medium transition-colors">
                    Регистрирай се
                </button>
            </form>

            <p class="text-center text-sm text-slate-500 mt-4">
                Вече имате акаунт?
                <a th:href="@{/login}" class="text-teal-700 hover:underline">Влезте тук</a>
            </p>
        </div>
    </div>
</section>
</body>
</html>
